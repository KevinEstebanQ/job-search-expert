services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      # Persist the SQLite DB across container restarts
      - ./db:/app/db
      # Profile directory — auto-provisioned by the app on first run
      - ./profiles/me:/app/profile
    env_file:
      - path: .env
        required: false   # scrapers/API work without it; only agent endpoints need ANTHROPIC_API_KEY
    environment:
      - DB_PATH=/app/db/jobs.db
      - ACTIVE_PROFILE_PATH=/app/profile
    # Backend is NOT exposed to the host — nginx proxies /api/* internally
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
